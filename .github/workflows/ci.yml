name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# Zero API credits: no external calls during tests.
# Backend pytest: pure unit/integration tests with mocked network.
# Playwright: API routes intercepted with fixture JSON, no real backend needed.

jobs:
  # ── 1. Backend — pytest ──────────────────────────────────────────────────────
  pytest:
    name: pytest (backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: backend
        env:
          # Stub required env vars — tests never reach the real services
          DATABASE_URL: "sqlite:///./test.db"
          ODDS_API_KEY: "test-key-no-calls"
          ADMIN_PASSWORD: "changeme"
          ODDS_POLL_MODE: "rich"
          REDIS_URL: "redis://localhost:6379"
        run: |
          pytest tests/ -v --tb=short --no-header \
            -p no:warnings \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60

  # ── 2. Frontend — vitest (unit) ──────────────────────────────────────────────
  vitest:
    name: vitest (frontend unit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest
        working-directory: frontend
        run: npx vitest run --reporter=verbose

  # ── 3. UI — Playwright (e2e) ─────────────────────────────────────────────────
  playwright:
    name: playwright (e2e)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: frontend
        # Backend NOT needed — all API routes are mocked in the test files
        env:
          CI: "true"
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
